name: Build backend provider images

on:
  workflow_dispatch:
    inputs:
      providers:
        description: 'Providers to build (comma-separated, or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cpu
          - nvidia
          - rockchip
      push:
        description: 'Push to ghcr.io after build'
        required: true
        default: 'true'
        type: boolean
  push:
    paths:
      - 'mnemos-backend/**'
      - '.github/workflows/build-backend-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  resolve:
    name: Resolve target providers
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.set.outputs.providers }}
    steps:
      - id: set
        run: |
          if [[ "${{ inputs.providers }}" == "all" ]]; then
            echo 'providers=["cpu","nvidia","rockchip"]' >> "$GITHUB_OUTPUT"
          else
            csv='"'$(echo "${{ inputs.providers }}" | tr ',' '\n' | tr -d ' ' | paste -sd '","' -)'"'
            echo "providers=[${csv}]" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.provider }} / ${{ matrix.arch }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.resolve.outputs.providers) }}
        include:
          - provider: cpu
            arch: amd64
            runner: ubuntu-latest
            target: linux/amd64
            base_image: python:3.14-slim
          - provider: cpu
            arch: arm64
            runner: ubuntu-26.04-arm
            target: linux/arm64
            base_image: python:3.14-slim
          - provider: nvidia
            arch: amd64
            runner: ubuntu-latest
            target: linux/amd64
            base_image: nvidia/cuda:12.4.1-cudnn-runtime-ubuntu24.04
          - provider: nvidia
            arch: arm64
            runner: ubuntu-26.04-arm
            target: linux/arm64
            base_image: nvidia/cuda:12.4.1-cudnn-runtime-ubuntu24.04
          - provider: rockchip
            arch: arm64
            runner: ubuntu-26.04-arm
            target: linux/arm64
            base_image: python:3.14-slim

    steps:
      - uses: actions/checkout@v4

      - name: Read backend version
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/p' \
            mnemos-backend/app/_version.py | head -n1)"
          if [[ -z "$version" ]]; then
            echo "::error::Could not read version from mnemos-backend/app/_version.py"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (versioned + stable)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./mnemos-backend
          file: ./mnemos-backend/Dockerfile
          platforms: ${{ matrix.target }}
          push: ${{ inputs.push }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mnemos-backend:${{ steps.version.outputs.version }}-${{ matrix.provider }}
            ghcr.io/${{ github.repository_owner }}/mnemos-backend:stable-${{ matrix.provider }}
          build-args: |
            INSTALL_PROVIDER=${{ matrix.provider }}
            BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=gha,scope=backend-${{ matrix.provider }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.provider }}-${{ matrix.arch }}
