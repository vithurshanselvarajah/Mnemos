# =============================================================================
# CI — run on every push and PR
# =============================================================================
#
# This workflow is intentionally minimal: it runs the test suite + lint
# on the source tree, in parallel. It is the gate the release workflows
# call via `uses: ./.github/workflows/ci.yml` before publishing images.
#
# Reused by:
#   - .github/workflows/release-backend.yml
#   - .github/workflows/release-frontend.yml
#   - .github/workflows/release-all.yml
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install ruff
        run: |
          python -m pip install --upgrade "pip>=25"
          python -m pip install --only-binary=:all: ruff

      - name: Run ruff check
        run: python -m ruff check .

      - name: Run ruff format --check
        run: python -m ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('mnemos-backend/requirements.txt', 'mnemos-frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade "pip>=25"
          python -m pip install --only-binary=:all: --prefer-binary \
            -r mnemos-backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          python -m pip install --only-binary=:all: --prefer-binary \
            -r mnemos-frontend/requirements.txt

      - name: Install test tooling
        run: |
          python -m pip install --only-binary=:all: --prefer-binary \
            pytest

      - name: Run pytest
        env:
          MNEMOS_DB_PATH: ${{ runner.temp }}/backend.db
          MNEMOS_FE_DB_PATH: ${{ runner.temp }}/frontend.db
          MNEMOS_FE_SECRET: test-secret-do-not-use-in-prod-32-bytes-min
        run: python -m pytest tests/

  build-images:
    name: Build images (sanity)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./mnemos-backend
          file: ./mnemos-backend/Dockerfile
          push: false
          load: true
          tags: mnemos-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./mnemos-frontend
          file: ./mnemos-frontend/Dockerfile
          push: false
          load: true
          tags: mnemos-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
