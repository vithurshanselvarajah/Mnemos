name: Release All

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Service to release'
        required: true
        default: 'both'
        type: choice
        options:
          - backend
          - frontend
          - both
      bump:
        description: 'Version bump for the unified release tag'
        required: true
        default: 'feature'
        type: choice
        options:
          - breaking
          - feature
          - hotfix

permissions:
  contents: write
  packages: write
  models: read

jobs:
  matrix-setup:
    name: Determine release targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ inputs.target }}" == "both" ]]; then
            echo 'targets=["backend", "frontend"]' >> "$GITHUB_OUTPUT"
          else
            echo "targets=[\"${{ inputs.target }}\"]" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    name: Prepare (${{ matrix.service }})
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.matrix-setup.outputs.targets) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read service version
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/p' \
            mnemos-${{ matrix.service }}/app/_version.py | head -n1)"
          if [[ -z "$version" ]]; then
            echo "::error::Could not read version from mnemos-${{ matrix.service }}/app/_version.py"
            exit 1
          fi
          tag="mnemos-${{ matrix.service }}-v${version}"
          echo "Read ${{ matrix.service }} version: $version (tag: $tag)"

  test:
    name: Test release candidate
    needs: matrix-setup
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build-by-arch:
    name: Build (${{ matrix.service }} / ${{ matrix.platform.arch }})
    needs:
      - matrix-setup
      - prepare
      - test
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        service: ${{ fromJSON(needs.matrix-setup.outputs.targets) }}
        platform:
          - arch: amd64
            runner: ubuntu-latest
            target: linux/amd64
          - arch: arm64
            runner: ubuntu-26.04-arm
            target: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version for target
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/p' \
            mnemos-${{ matrix.service }}/app/_version.py | head -n1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./mnemos-${{ matrix.service }}
          file: ./mnemos-${{ matrix.service }}/Dockerfile
          platforms: ${{ matrix.platform.target }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-mnemos-${{ matrix.service }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish (${{ matrix.service }})
    needs:
      - matrix-setup
      - build-by-arch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.matrix-setup.outputs.targets) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version for target
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/p' \
            mnemos-${{ matrix.service }}/app/_version.py | head -n1)"
          if [[ -z "$version" ]]; then
            echo "::error::Could not read version from mnemos-${{ matrix.service }}/app/_version.py"
            exit 1
          fi
          tag="mnemos-${{ matrix.service }}-v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-mnemos-${{ matrix.service }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=raw,value=stable
          flavor: latest=auto

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail

          TAG_FLAGS=$(jq -r '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }}"
          IMAGE_NAME_LOWER="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"

          DIGEST_REFS=""
          for digest in *; do
            if [[ -f "$digest" ]]; then
              DIGEST_REFS="${DIGEST_REFS} ${IMAGE_NAME_LOWER}@sha256:${digest}"
            fi
          done

          docker buildx imagetools create ${TAG_FLAGS} ${DIGEST_REFS}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }}:${{ steps.version.outputs.version }}

      - name: Collect commits for changelog
        id: commits
        run: |
          set -euo pipefail
          previous_tag="$(git describe --tags --match "mnemos-${{ matrix.service }}-*" --abbrev=0 2>/devnull || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..HEAD"
          else
            range="HEAD"
          fi
          
          # Write directly to a file to prevent shell expansion issues
          git log "$range" --pretty=format:"- %s (%h)%n%b" --name-only --no-merges -- "mnemos-${{ matrix.service }}" > /tmp/commits.txt

      - name: Generate changelog with GitHub AI
        id: ai_changelog
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o
          max-tokens: 700
          system-prompt: >-
            You write concise GitHub release notes for Mnemos (a self-hosted
            facial recognition stack). Use Markdown bullets. Do not invent
            changes. Focus only on user-visible changes.
          prompt: |
            Create release notes for mnemos-${{ matrix.service }}.

            Commits:
            $(cat /tmp/commits.txt)

      - name: Write release notes
        env:
          AI_NOTES_FILE: ${{ steps.ai_changelog.outputs.response-file }}
        run: |
          set -euo pipefail
          {
            echo "<!-- MNEMOS-RELEASE-CONTENT-START -->"
            if [[ -n "${AI_NOTES_FILE:-}" && -s "$AI_NOTES_FILE" ]]; then
              cat "$AI_NOTES_FILE"
            elif [[ -s /tmp/commits.txt ]]; then
              echo "## Changes"
              echo
              cat /tmp/commits.txt
            else
              echo "## Changes"
              echo
              echo "- Maintenance release"
            fi
            echo "<!-- MNEMOS-RELEASE-CONTENT-END -->"
            echo
            echo "## Docker image"
            echo "\`\`\`"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }}:${{ steps.version.outputs.version }}"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/mnemos-${{ matrix.service }}:stable"
            echo "\`\`\`"
          } > release-notes.md

      - name: Bundle release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp docker-compose.yml "dist/docker-compose.yml"
          cp .env.example "dist/.env.example"
          sed "s/\${MNEMOS_TAG:-latest}/${{ steps.version.outputs.version }}/g" docker-compose.yml \
            > "dist/docker-compose.pinned.yml"
          cd dist
          zip -r "mnemos-${{ matrix.service }}-${{ steps.version.outputs.version }}-compose.zip" \
            docker-compose.yml .env.example docker-compose.pinned.yml
          cd ..

      - name: Write per-service release info
        env:
          SERVICE: ${{ matrix.service }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository_owner }}/mnemos-${SERVICE}"
          image_ref="${image}:${VERSION}"
          image_stable="${image}:stable"
          cat > service-info.json <<JSON
          {
            "service": "${SERVICE}",
            "version": "${VERSION}",
            "image": "${image_ref}",
            "image_stable": "${image_stable}",
            "tag": "mnemos-${SERVICE}-v${VERSION}"
          }
          JSON
          cat service-info.json

      - name: Upload per-service release bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-mnemos-${{ matrix.service }}-${{ steps.version.outputs.version }}
          path: |
            dist/mnemos-${{ matrix.service }}-${{ steps.version.outputs.version }}-compose.zip
            release-notes.md
            service-info.json
          if-no-files-found: error
          retention-days: 7

  release-aggregator:
    name: Aggregate release
    needs:
      - matrix-setup
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download every per-service bundle
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-mnemos-*
          path: /tmp/bundles
          merge-multiple: true

      - name: Compute next release version
        id: next_version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          last="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "${last}" ]]; then
            major=0; minor=0; patch=0
          else
            stripped="${last#v}"
            IFS='.' read -r major minor patch <<< "${stripped}"
            [[ "${major:-0}" =~ ^[0-9]+$ ]] || major=0
            [[ "${minor:-0}" =~ ^[0-9]+$ ]] || minor=0
            [[ "${patch:-0}" =~ ^[0-9]+$ ]] || patch=0
          fi
          case "${BUMP}" in
            breaking) major=$((major + 1)); minor=0; patch=0 ;;
            feature)  minor=$((minor + 1)); patch=0 ;;
            hotfix)   patch=$((patch + 1)) ;;
            *) echo "::error::Unknown bump: ${BUMP}"; exit 1 ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "last_tag=${last:-<none>}"
          echo "bump=${BUMP}"
          echo "next=${next}"
          echo "next=${next}" >> "$GITHUB_OUTPUT"

      - name: Collect per-service notes and info
        id: notes_collect
        run: |
          set -euo pipefail
          rm -rf /tmp/notes
          mkdir -p /tmp/notes

          if compgen -G '/tmp/bundles/bundle-mnemos-*' >/dev/null; then
            for dir in /tmp/bundles/bundle-mnemos-*; do
              [[ -d "$dir" ]] || continue
              svc="$(basename "$dir" | sed -E 's/^bundle-mnemos-([^-]+)-.*/\1/')"
              [[ -s "$dir/release-notes.md" ]] && cp "$dir/release-notes.md" "/tmp/notes/${svc}.md"
              [[ -s "$dir/service-info.json" ]] && cp "$dir/service-info.json" "/tmp/notes/${svc}.json"
            done
          else
            mapfile -t infos < <(find /tmp/bundles -maxdepth 1 -name 'service-info.json' | sort)
            mapfile -t notes < <(find /tmp/bundles -maxdepth 1 -name 'release-notes.md'   | sort)
            if [[ "${#infos[@]}" -ne "${#notes[@]}" ]]; then
              echo "::error::Mismatch between service-info.json (${#infos[@]})" \
                   "and release-notes.md (${#notes[@]}) in /tmp/bundles"
              ls -la /tmp/bundles
              exit 1
            fi
            for i in "${!infos[@]}"; do
              svc="$(jq -r '.service' "${infos[$i]}")"
              cp "${infos[$i]}" "/tmp/notes/${svc}.json"
              cp "${notes[$i]}" "/tmp/notes/${svc}.md"
            done
          fi

          if ! ls /tmp/notes/*.json >/dev/null 2>&1; then
            echo "::error::No service info collected. Bundles:"
            ls -la /tmp/bundles
            exit 1
          fi
          ls -la /tmp/notes

      - name: Build unified release notes (first pass)
        env:
          NEXT_VERSION: ${{ steps.next_version.outputs.next }}
        run: |
          set -euo pipefail
          {
            echo "## Mnemos ${NEXT_VERSION}"
            echo
            echo "Self-hosted facial recognition stack — backend, frontend, and pgvector."
            echo
            echo "### Services in this release"
            echo
            for info in /tmp/notes/*.json; do
              [[ -f "$info" ]] || continue
              svc="$(jq -r '.service' "$info")"
              ver="$(jq -r '.version' "$info")"
              echo "* **mnemos-${svc}** v${ver}"
            done
            echo
            echo "### Changes"
            echo
            for note in /tmp/notes/*.md; do
              [[ -s "$note" ]] || continue
              svc="$(basename "$note" .md)"
              {
                echo "#### mnemos-${svc}"
                echo
                sed -n '/<!-- MNEMOS-RELEASE-CONTENT-START -->/,/<!-- MNEMOS-RELEASE-CONTENT-END -->/p' "$note" \
                  | sed -e '1d' -e '$d' \
                  | awk '
                    BEGIN { }
                    /^# /  { sub(/^# /, ""); print; next }
                    /^## / { sub(/^## /, "##### "); print; next }
                    /^### / { sub(/^### /, "###### "); print; next }
                    /^#### / { sub(/^#### /, "####### "); print; next }
                    { print }
                  '
                echo
              }
            done
            echo "### Docker images"
            echo
            for info in /tmp/notes/*.json; do
              [[ -f "$info" ]] || continue
              img="$(jq -r '.image' "$info")"
              img_stable="$(jq -r '.image_stable' "$info")"
              echo "* \`${img}\`"
              echo "* \`${img_stable}\`"
            done
            echo
            echo "### Install / upgrade"
            echo
            echo '```bash'
            echo "curl -L [https://github.com/$](https://github.com/$){{ github.repository }}/releases/download/${NEXT_VERSION}/docker-compose.yml -o docker-compose.yml"
            echo "curl -L [https://github.com/$](https://github.com/$){{ github.repository }}/releases/download/${NEXT_VERSION}/.env.example -o .env.example"
            echo "cp .env.example .env   # then edit secrets"
            echo "docker compose pull && docker compose up -d"
            echo '```'
          } > release-notes.md
          echo "Wrote release-notes.md ($(wc -l < release-notes.md) lines)"

      - name: Second pass — dedupe bullets and re-render
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          awk '
            BEGIN { section = "" }
            /^#### / { section = $0; print; next }
            /^### /  { section = "";  print; next }
            /^## /   { section = "";  print; next }
            {
              key = section "||" $0
              if ($0 ~ /^[[:space:]]*$/ || !seen[key]++) {
                print
              }
            }
          ' release-notes.md > "$tmp"
          mv "$tmp" release-notes.md
          echo "After dedupe: $(wc -l < release-notes.md) lines"

      - name: Sanity-scan release notes
        run: |
          set -euo pipefail
          fail=0

          if grep -q '^### Docker images$' release-notes.md; then
            if ! awk '/^### Docker images$/{f=1;next} /^### /{f=0} f && NF>0' \
                 release-notes.md | grep -q '.'; then
              echo "::error::Docker images section is empty"
              fail=1
            fi
          else
            echo "::error::Missing '### Docker images' section"
            fail=1
          fi

          dup_in_section="$(awk '
            /^### / {
              if (section != "") {
                for (i in seen) {
                  if (seen[i] > 1) print section ": " i
                }
              }
              section = $0; delete seen; next
            }
            /`ghcr\.io\/[^`]+`/ {
              match($0, /`ghcr\.io\/[^`]+`/);
              ref = substr($0, RSTART+1, RLENGTH-2);
              seen[ref]++
            }
            END {
              if (section != "") {
                for (i in seen) {
                  if (seen[i] > 1) print section ": " i
                }
              }
            }
          ' release-notes.md || true)"
          if [[ -n "$dup_in_section" ]]; then
            echo "::error::Duplicate image refs within a section:"
            echo "$dup_in_section"
            fail=1
          fi

          for info in /tmp/notes/*.json; do
            [[ -f "$info" ]] || continue
            svc="$(jq -r '.service' "$info")"
            if ! grep -q "mnemos-${svc}" release-notes.md; then
              echo "::error::Release notes do not mention service: ${svc}"
              fail=1
            fi
          done

          for note in /tmp/notes/*.json; do
            [[ -f "$note" ]] || continue
            svc="$(jq -r '.service' "$note")"
            awk -v s="#### mnemos-${svc}" '
              $0 == s {f=1; next}
              /^#### / {f=0}
              f && NF > 0 {found=1; exit}
              END {exit !found}
            ' release-notes.md || {
              echo "::error::Empty section for service ${svc}"
              fail=1
            }
          done

          if [[ "$fail" -ne 0 ]]; then
            echo "::group::release-notes.md"
            cat release-notes.md
            echo "::endgroup::"
            exit 1
          fi
          echo "Release notes pass sanity scan."

      - name: Build unified release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          cp docker-compose.yml dist/docker-compose.yml
          cp .env.example dist/.env.example
          pinned="dist/docker-compose.pinned.yml"
          sed "s/\${MNEMOS_TAG:-latest}/${{ steps.next_version.outputs.next }}/g" \
            docker-compose.yml > "$pinned"
          cd dist
          zip -r "mnemos-${{ steps.next_version.outputs.next }}-compose.zip" \
            docker-compose.yml .env.example docker-compose.pinned.yml
          cd ..
          ls -la dist

      - name: Create unified GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.next_version.outputs.next }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets only."
            gh release upload "$TAG" \
              "dist/mnemos-${TAG}-compose.zip" \
              --clobber
          else
            gh release create "$TAG" \
              "dist/mnemos-${TAG}-compose.zip" \
              --title "Mnemos ${TAG}" \
              --notes-file release-notes.md \
              --target "${{ github.sha }}"
          fi

      - name: Update `stable` pointer
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.next_version.outputs.next }}
        run: |
          set -euo pipefail
          for info in /tmp/notes/*.json; do
            [[ -f "$info" ]] || continue
            svc="$(jq -r '.service' "$info")"
            ver="$(jq -r '.version' "$info")"
            echo "Image tag for ${svc} is unchanged: mnemos-${svc}-v${ver} (stable: mnemos-${svc}:stable)."
          done

      - name: Summary
        env:
          NEXT: ${{ steps.next_version.outputs.next }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          {
            echo "## Mnemos ${NEXT}"
            echo
            echo "* Bump: \`${BUMP}\`"
            for info in /tmp/notes/*.json; do
              [[ -f "$info" ]] || continue
              svc="$(jq -r '.service' "$info")"
              ver="$(jq -r '.version' "$info")"
              echo "* mnemos-${svc}: v${ver}"
            done
            echo "* Release: https://github.com/${{ github.repository }}/releases/tag/${NEXT}"
          } >> "$GITHUB_STEP_SUMMARY"