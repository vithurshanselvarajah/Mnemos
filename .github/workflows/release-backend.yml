# =============================================================================
# Release: backend
# =============================================================================
#
# Builds the mnemos-backend image and pushes it to GHCR with both
# `<version>` and `stable` tags. Also creates a GitHub release with
# AI-generated notes from the commit range.
#
# Triggers (any of):
#   - Push to `main` whose commit message contains `release-backend:`
#   - Manual `workflow_dispatch` from the Actions tab
#
# The version is read from `mnemos-backend/app/_version.py`.
# =============================================================================

name: Release backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  models: read

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.mode.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check release trigger
        id: mode
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          should_release=false
          lc_message="${COMMIT_MESSAGE,,}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_release=true
          elif [[ "$lc_message" == *"release-backend:"* || "$lc_message" == *"release-all:"* ]]; then
            if [[ "$REF_NAME" == "main" ]]; then
              should_release=true
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.mode.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read backend version
        if: steps.mode.outputs.should_release == 'true'
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*["'"'"']\([^"'"'"']*\)["'"'"'].*/\1/p' \
            mnemos-backend/app/_version.py | head -n1)"
          if [[ -z "$version" ]]; then
            echo "::error::Could not read version from mnemos-backend/app/_version.py"
            exit 1
          fi
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Read backend version: $version (tag: $tag)"

  test:
    name: Test release candidate
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    name: Publish backend image + release
    needs:
      - prepare
      - test
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for the backend image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mnemos-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=stable
          flavor: latest=auto

      - name: Build and push the backend image
        uses: docker/build-push-action@v6
        with:
          context: ./mnemos-backend
          file: ./mnemos-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Collect commits for changelog
        id: commits
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..HEAD"
          else
            range="HEAD"
          fi
          {
            echo "commits<<EOF"
            git log "$range" --pretty=format:"- %s (%h)%n%b" --name-only --no-merges
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Collect contributor shoutouts
        id: contributors
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..HEAD"
            previous_authors="$(git log "$previous_tag" --format='%aN <%aE>' | sort -u)"
          else
            range="HEAD"
            previous_authors=""
          fi
          range_authors="$(git log "$range" --format='%aN <%aE>' | sort -u)"
          if [[ -n "$previous_authors" ]]; then
            new_authors="$(comm -23 <(printf '%s\n' "$range_authors") <(printf '%s\n' "$previous_authors") | sed '/^$/d')"
          else
            new_authors="$range_authors"
          fi
          new_details=""
          if [[ -n "$new_authors" ]]; then
            while IFS= read -r author; do
              [[ -z "$author" ]] && continue
              new_details+="- ${author}\n"
              while IFS= read -r commit_line; do
                new_details+="  - ${commit_line}\n"
              done < <(git log "$range" --author="$author" --pretty=format:'%s (%h)' --no-merges)
              new_details+="\n"
            done <<< "$new_authors"
          fi
          {
            echo "new_contributor_details<<EOF"
            if [[ -n "$new_details" ]]; then
              printf '%b' "$new_details"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog with GitHub AI
        id: ai_changelog
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o
          max-tokens: 700
          system-prompt: >-
            You write concise GitHub release notes for Mnemos (a self-hosted
            facial recognition stack). Use Markdown bullets. Do not invent
            changes. Use the commit subject, body, and changed files to
            summarize what changed. Focus only on user-visible changes
            (new features, behavior changes, notable fixes). Skip internal
            refactors, version bumps, dependency churn, and test-only edits.
            Skip release tags prefixed with "release-backend:" or
            "release-frontend:" (those are release markers, not changes).
          prompt: |
            Create release notes for mnemos-backend.

            Channel: release
            Version: ${{ needs.prepare.outputs.version }}
            Tag: ${{ needs.prepare.outputs.tag }}

            Commits:
            ${{ steps.commits.outputs.commits }}

      - name: Write release notes
        env:
          AI_NOTES_FILE: ${{ steps.ai_changelog.outputs.response-file }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          COMMITS: ${{ steps.commits.outputs.commits }}
          NEW_CONTRIBUTOR_DETAILS: ${{ steps.contributors.outputs.new_contributor_details }}
        run: |
          set -euo pipefail
          {
            echo
            if [[ -n "${AI_NOTES_FILE:-}" && -s "$AI_NOTES_FILE" ]]; then
              cat "$AI_NOTES_FILE"
            else
              echo "## Changes"
              echo
              if [[ -n "$COMMITS" ]]; then
                echo "$COMMITS"
              else
                echo "- Release ${TAG}"
              fi
            fi
            if [[ -n "${NEW_CONTRIBUTOR_DETAILS:-}" ]]; then
              echo
              echo "## New contributors"
              echo
              echo "$NEW_CONTRIBUTOR_DETAILS"
            fi
            echo
            echo "## Docker image"
            echo
            echo "\`\`\`"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/mnemos-backend:${VERSION}"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/mnemos-backend:stable"
            echo "\`\`\`"
          } > release-notes.md

      - name: Bundle release artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp docker-compose.yml "dist/docker-compose.yml"
          cp .env.example "dist/.env.example"
          # Tag-defaulted copy of the compose so end users can just `docker compose up`
          # without setting MNEMOS_TAG.
          sed "s/\${MNEMOS_TAG:-latest}/${VERSION}/g" docker-compose.yml \
            > "dist/docker-compose.pinned.yml"
          cd dist
          zip -r "mnemos-backend-${VERSION}-compose.zip" \
            docker-compose.yml .env.example docker-compose.pinned.yml
          cd ..
          ls -la dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          title="mnemos-backend ${TAG}"
          gh release create "$TAG" \
            "dist/mnemos-backend-${VERSION}-compose.zip" \
            --title "$title" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}"
