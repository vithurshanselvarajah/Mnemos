{% extends "base.html" %}
{% block title %}Persons · Mnemos{% endblock %}
{% block content %}
<div class="row between" style="margin-bottom: .5rem">
  <h1>Persons</h1>
</div>

{% if is_admin %}
<div class="card">
  <h3>Add a person</h3>
  <form id="add-person-form"
        hx-post="/partials/persons"
        hx-target="#persons-list"
        hx-swap="innerHTML"
        class="row"
        style="gap:.5rem">
    <label style="margin:0;flex:1">Name
      <input name="name" required />
    </label>
    <label style="margin:0;width:160px">Custom threshold
      <input name="custom_threshold" type="number" min="0" max="1" step="0.01" placeholder="0.40" />
    </label>
    <button>Add person</button>
  </form>
  <div id="add-person-error" class="error-banner" style="display:none"></div>
  <script>
    document.getElementById('add-person-form').addEventListener('htmx:beforeRequest', () => {
      document.getElementById('add-person-error').style.display = 'none';
    });
    document.getElementById('add-person-form').addEventListener('htmx:beforeSwap', (e) => {
      // If the response is an error, stop the swap and show it inline instead.
      if (e.detail.xhr.status >= 400) {
        e.preventDefault();
        let msg = e.detail.xhr.responseText || ('Failed (' + e.detail.xhr.status + ')');
        try {
          const wrapper = document.createElement('div');
          wrapper.innerHTML = msg;
          const errDiv = wrapper.querySelector('.error');
          if (errDiv) msg = errDiv.textContent || msg;
        } catch (_) { /* keep raw */ }
        const errEl = document.getElementById('add-person-error');
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    });
    document.getElementById('add-person-form').addEventListener('htmx:afterRequest', (e) => {
      if (e.detail.successful) {
        e.target.reset();
      }
    });
  </script>
</div>
{% endif %}

<div class="card" id="persons-list">
  {% include "partials/persons_list.html" %}
</div>
{% endblock %}
