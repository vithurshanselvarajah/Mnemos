{% extends "base.html" %}
{% block title %}Users · Mnemos{% endblock %}
{% block content %}
<div class="row between" style="margin-bottom: 1rem">
  <h1>Users</h1>
</div>

<div class="card">
  <h3>Add a user</h3>
  <form id="add-user-form"
        hx-post="/partials/users"
        hx-target="#users-list"
        hx-swap="outerHTML"
        class="row" style="gap:.5rem">
    <label style="margin:0;flex:1">Username
      <input name="username" required />
    </label>
    <label style="margin:0;flex:1">Password (≥8 chars)
      <input name="password" type="password" minlength="8" required />
    </label>
    <label style="margin:0;width:160px">Role
      <select name="role">
        <option value="Operator" selected>Operator</option>
        <option value="Admin">Admin</option>
      </select>
    </label>
    <button>Add user</button>
  </form>
  <div id="add-user-error" class="error-banner" style="display:none"></div>
</div>

<div class="card" id="users-list"
     hx-get="/partials/users"
     hx-trigger="load"
     hx-swap="outerHTML">
  <p class="muted">Loading…</p>
</div>

<script>
  // Reset the add-user form on success and surface server errors.
  // Lives outside the swap target so a failed create doesn't keep the
  // form filled in.
  document.getElementById('add-user-form').addEventListener('htmx:afterRequest', (e) => {
    const errEl = document.getElementById('add-user-error');
    if (e.detail.successful) {
      e.target.reset();
      if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
      return;
    }
    // Backend may return JSON ({"detail": "..."}) or an HTML <div>
    // error block depending on the endpoint. Parse whichever we can.
    let msg = 'Failed (' + e.detail.xhr.status + ')';
    const raw = (e.detail.xhr && e.detail.xhr.responseText) || '';
    try {
      const d = JSON.parse(raw);
      if (d.detail) msg = Array.isArray(d.detail) ? d.detail.map(x => x.msg).join('; ') : d.detail;
    } catch (_) {
      // Strip surrounding <div class="error">…</div> if present.
      const m = raw.match(/<div[^>]*>([^<]+)<\/div>/i);
      if (m) msg = m[1].trim();
    }
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  });
</script>
{% endblock %}
