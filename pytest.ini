# Project-wide pytest configuration for Mnemos V2.
#
# Both services (mnemos-backend and mnemos-frontend) share this
# top-level conftest. It auto-loads the env vars that point the
# services at temp SQLite databases so the test suite is fully
# isolated from any real install on the host.
#
# Note: import order matters. We set MNEMOS_* / MNEMOS_FE_*
# env vars BEFORE any `app.*` module is imported, otherwise the
# pydantic-settings `Settings()` constructor will snapshot
# defaults instead of our test overrides.

[pytest]
testpaths = tests
addopts = -ra -q --strict-markers
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: marks tests as slow (deselect with -m "not slow")
